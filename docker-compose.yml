services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stoxsim
      POSTGRES_USER: stoxsim
      POSTGRES_PASSWORD: stoxsim
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stoxsim -d stoxsim"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/stoxsim
      DATABASE_USERNAME: stoxsim
      DATABASE_PASSWORD: stoxsim
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-local-development-only-change-this-secret-2026}
      UPSTOX_ANALYTICS_TOKEN: ${UPSTOX_ANALYTICS_TOKEN:-}
      UPSTOX_INSTRUMENT_MASTER_URL: ${UPSTOX_INSTRUMENT_MASTER_URL:-https://assets.upstox.com/market-quote/instruments/exchange/complete.json.gz}
      UPSTOX_STREAM_ENABLED: ${UPSTOX_STREAM_ENABLED:-false}
      SIMULATED_SLIPPAGE_BASIS_POINTS: ${SIMULATED_SLIPPAGE_BASIS_POINTS:-5}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 | grep -q StoxSim"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  postgres-data:
  redis-data:
