spring:
  application:
    name: stoxsim-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/stoxsim}
    username: ${DATABASE_USERNAME:stoxsim}
    password: ${DATABASE_PASSWORD:stoxsim}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

stoxsim:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  auth:
    jwt-secret: ${JWT_SECRET:local-development-only-change-this-secret-2026}
    access-token-minutes: 15
    refresh-token-days: 30
  accounts:
    india-starting-balance: 500000.00
    united-states-starting-balance: 10000.00
  market-data:
    upstox:
      analytics-token: ${UPSTOX_ANALYTICS_TOKEN:}
      instrument-master-url: ${UPSTOX_INSTRUMENT_MASTER_URL:https://assets.upstox.com/market-quote/instruments/exchange/complete.json.gz}
      instrument-sync-on-startup: ${UPSTOX_INSTRUMENT_SYNC_ON_STARTUP:true}
      stream-enabled: ${UPSTOX_STREAM_ENABLED:false}
      quote-ttl-seconds: 30
      quote-retention-days: 7
      closed-quote-refresh-seconds: 900
      candle-ttl-minutes: 5
      stale-after-seconds: 15
      initial-instrument-keys:
        - NSE_INDEX|Nifty 50
        - NSE_INDEX|Nifty Bank
        - NSE_INDEX|Nifty Fin Service
        - NSE_INDEX|Nifty IT
        - NSE_INDEX|India VIX
        - BSE_INDEX|SENSEX
  trading:
    slippage-basis-points: ${SIMULATED_SLIPPAGE_BASIS_POINTS:5}
