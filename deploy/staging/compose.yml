name: stoxsim-staging

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    mem_limit: 192m
    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - max_connections=30
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    mem_limit: 64m
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 32mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: ghcr.io/m4rk9/stoxsim-api:${STOXSIM_IMAGE_TAG:?Set STOXSIM_IMAGE_TAG to a commit SHA}
    restart: unless-stopped
    mem_limit: 448m
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: https://${STAGING_WEB_DOMAIN:?Set STAGING_WEB_DOMAIN}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      UPSTOX_ANALYTICS_TOKEN: ${UPSTOX_ANALYTICS_TOKEN:-}
      UPSTOX_STREAM_ENABLED: ${UPSTOX_STREAM_ENABLED:-false}
      SIMULATED_SLIPPAGE_BASIS_POINTS: ${SIMULATED_SLIPPAGE_BASIS_POINTS:-5}
      JAVA_TOOL_OPTIONS: "-XX:+UseSerialGC -Xms64m -Xmx224m -XX:MaxMetaspaceSize=96m -Xss256k"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend:
    image: ghcr.io/m4rk9/stoxsim-web:${STOXSIM_IMAGE_TAG:?Set STOXSIM_IMAGE_TAG to a commit SHA}
    restart: unless-stopped
    mem_limit: 192m
    environment:
      NODE_OPTIONS: --max-old-space-size=96
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 | grep -q StoxSim"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 64m
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL}
      STAGING_API_DOMAIN: ${STAGING_API_DOMAIN:?Set STAGING_API_DOMAIN}
      STAGING_WEB_DOMAIN: ${STAGING_WEB_DOMAIN:?Set STAGING_WEB_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - edge

networks:
  edge:
  data:
    internal: true

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
