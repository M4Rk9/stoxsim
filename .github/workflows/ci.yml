name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  browser-acceptance:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install browser test dependencies
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Start complete application stack
        run: docker compose up --build --detach --wait --wait-timeout 180
      - name: Run authenticated learner journey
        working-directory: frontend
        run: npm run e2e
      - name: Capture stack logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-compose.log
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-acceptance-diagnostics
          path: |
            frontend/playwright-report
            frontend/test-results
            docker-compose.log
          if-no-files-found: ignore
      - name: Stop application stack
        if: always()
        run: docker compose down --volumes
